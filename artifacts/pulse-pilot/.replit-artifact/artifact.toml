kind = "mobile"
previewPath = "/"
title = "VIVA - Health & Wellness App"
version = "1.0.0"
id = "artifacts/pulse-pilot"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20151

[services.development]
run = "pnpm --filter @workspace/pulse-pilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pulse-pilot", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pulse-pilot", "run", "serve" ]

[services.env]
PORT = "20151"
BASE_PATH = "/"
