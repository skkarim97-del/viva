kind = "web"
previewPath = "/"
title = "Viva Clinic"
version = "1.0.0"
id = "artifacts/viva-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18616

[services.development]
run = "pnpm --filter @workspace/viva-dashboard run dev"

[services.production.build]
args = [ "pnpm", "--filter", "@workspace/viva-dashboard", "run", "build" ]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"

[services.production.run]
args = [ "node", "artifacts/viva-dashboard/server.mjs" ]

[services.production.run.env]
PORT = "18616"
NODE_ENV = "production"
API_ORIGIN = "https://api.itsviva.com"

[services.production.health.startup]
path = "/healthz"

[services.env]
PORT = "18616"
BASE_PATH = "/"
